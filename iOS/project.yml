name: Litterspend
options:
  bundleIdPrefix: com.shimondeitel.litteruse
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "W7Q885Q59C"
    CODE_SIGN_STYLE: Automatic
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
targets:
  Litterspend:
    type: application
    platform: iOS
    sources:
      - path: Litterspend
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.litteruse
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: Litterspend/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: "YES"
        GENERATE_INFOPLIST_FILE: "NO"
  LitterspendTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: LitterspendTests
      - path: Litterspend.storekit
    dependencies:
      - target: Litterspend
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.litteruse.tests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
  LitterspendUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: LitterspendUITests
    dependencies:
      - target: Litterspend
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.litteruse.uitests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
schemes:
  Litterspend:
    build:
      targets:
        Litterspend: all
        LitterspendTests: [test]
        LitterspendUITests: [test]
    run:
      config: Debug
      storeKitConfiguration: Litterspend.storekit
    test:
      config: Debug
      storeKitConfiguration: Litterspend.storekit
      targets:
        - LitterspendTests
        - LitterspendUITests
    archive:
      config: Release
